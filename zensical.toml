[project]
site_name = "adbcli"
site_description = "A command-line tool for querying databases via ADBC."
copyright = "Copyright &copy; 2026 Columnar Technologies Inc."
nav = [
    { "Getting Started" = "index.md" },
    { "Installation" = "installation.md" },
    { "Databases" = "databases.md" },
    { "Reference" = "reference.md" },
]

[project.theme]
language = "en"
logo = "images/logo.svg"
favicon = "images/logo.svg"
font = false
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/database"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/columnar-tech"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://linkedin.com/company/columnar-tech"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/columnar_tech"

[[project.extra.social]]
icon = "fontawesome/brands/bluesky"
link = "https://bsky.app/profile/columnar.tech"
